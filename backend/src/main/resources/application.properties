spring.application.name=online-compiler

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/compiler_db}
spring.data.mongodb.database=${MONGODB_DATABASE:compiler_db}

# Server Port
server.port=8080

# Google OAuth2
google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id.apps.googleusercontent.com}

# JDoodle API
jdoodle.client-id=${JDOODLE_CLIENT_ID:your-jdoodle-client-id}
jdoodle.client-secret=${JDOODLE_CLIENT_SECRET:your-jdoodle-client-secret}
jdoodle.api-url=https://api.jdoodle.com/v1/execute

# JWT Secret (for our own JWT tokens)
jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-min-256-bits-long-change-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Logging
logging.level.com.compiler=DEBUG
logging.level.org.springframework.security=INFO
